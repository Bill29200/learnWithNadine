<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-success text-white">
          <h3 class="mb-0">Créer un compte</h3>
        </div>
        <div class="card-body">
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Nom</label>
              <input type="text" class="form-control" [(ngModel)]="user.lastName"
                     name="lastName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Prénom</label>
              <input type="text" class="form-control" [(ngModel)]="user.firstName"
                     name="firstName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [(ngModel)]="user.email"
                     name="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input type="password" class="form-control" [(ngModel)]="user.password"
                     name="password" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Rôle</label>
              <select class="form-control" [(ngModel)]="user.role" name="role">
                <option value="userStudent">Étudiant</option>
                <option value="userTrainer">Formateur</option>
                <option value="userAdmin">Administrateur</option>
              </select>
            </div>
            <div *ngIf="successMessage" class="alert alert-success">
              {{successMessage}}
            </div>
            <button type="submit" class="btn btn-success w-100">Créer le compte</button>
          </form>
          <div class="mt-3 text-center">
            <a routerLink="/login">Déjà un compte? Se connecter</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
